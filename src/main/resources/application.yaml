spring:
  application:
    name: MagicFridgeAI
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:fridge_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

chatgpt:
  api:
    url: https://api.openai.com/v1/chat/completions

api:
  key: ${API_KEY_CHAT_GPT}


